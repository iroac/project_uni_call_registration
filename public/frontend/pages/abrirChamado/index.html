<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <title>Sistemas de chamados</title>
  <script src="/frontend/pages/abrirChamado/index.js" type="module" defer></script>
  <script src="/frontend/components/notify-toast.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"
    defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"
    defer></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
    integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"
    defer></script>
  <link rel="stylesheet" href="/frontend/global/styles.css" />
</head>

<body>
  <div class="d-flex justify-content-center align-items-center vh-100">
    <div class="bg-white shadow-lg rounded-4 p-5"
      style="width: 100%; max-height: 90vh; overflow-y: auto; margin: 20px;">
      <div class="mb-5">
        <h1 class="h2 fw-bold mb-2">Abrir Chamado</h1>
        <p class="text-muted mb-0">Preencha os dados para registrar um novo chamado</p>
      </div>

      <form id="formAbrirChamado">

        <div class="row g-3 mb-4">
          <div class="col-12">
            <label for="chamado-titulo" class="form-label fw-500">Título</label>
            <input required type="text" class="form-control form-control-lg" autocomplete="name" name="titulo"
              id="chamado-titulo" placeholder="Resumo do problema">
          </div>
        </div>

        <div class="row g-3 mb-4">
          <div class="col-12">
            <textarea class="form-control form-control-lg" autocomplete="description" name="descricao"
              id="chamado-descricao" placeholder="Detalhes do problema"></textarea>
          </div>
        </div>

        <div class="row g-3 mb-4">

          <div class="col-md-6">
            <label for="chamado-departamento" class="form-label fw-500">Departamento</label>
            <select class="form-select form-select-lg " required aria-label="Departamento" name="departamento"
              id="chamado-departamento">
              <option selected>Selecione o departamento</option>
              <option value="TI">TI</option>
              <option value="RH">RH</option>
              <option value="FINANCEIRO">Financeiro</option>
            </select>
          </div>

          <div class="col-md-6">
            <label for="chamado-regiao" class="form-label fw-500">Região</label>
            <select required type="text" class="form-select form-select-lg" autocomplete="off" inputmode="numeric"
              name="regiao" id="chamado-regiao" placeholder="sua região">
              <option selected>Selecione a região</option>
              <option value="NORTE">Norte</option>
              <option value="NOROESTE">Noroeste</option>
              <option value="LESTE">Leste</option>
              <option value="OESTE">Oeste</option>
              <option value="SUL">Sul</option>
              <option value="SULDESTE">Suldeste</option>
            </select>
          </div>
        </div>

        <div class="row g-3 mb-4">
          <div class="col-12">
            <label for="chamado-responsavel" class="form-label fw-500">Responsável</label>
            <input required type="text" class="form-control form-control-lg" autocomplete="name" name="responsavel"
              id="chamado-responsavel" placeholder="Nome do responsável pelo atendimento">
          </div>
        </div>

        <div class="row g-3 mb-4">
          <div class="col-12">
            <label for="chamado-status" class="form-label fw-500">Status</label>
            <select required disabled class="form-select form-select-lg" aria-label="Status" name="status"
              id="chamado-status">
              <option>Selecione o status</option>
              <option selected value="ABERTO">Em aberto</option>
              <option value="ANDAMENTO">Em andamento</option>
              <option value="RESOLVIDO">Resolvido</option>
              <option value="FECHADO">Fechado</option>
            </select>
            <p class="mt-2">Ao criar um chamado, ele será registrado com o status "Em aberto".</p>
          </div>
        </div>


        <div class="container-fluid justify-content-between align-items-start d-flex flex-row rounded-3 gap-3 p-0 mt-4">
          <button class="btn btn-light btn-lg fw-semibold rounded-3 w-100" id="cancel-button">
            Cancelar
          </button>
          <button type="submit" class="btn btn-primary btn-lg fw-semibold rounded-3 w-100 ">
            <span class="spinner-border spinner-border-sm d-none me-2" id="chamado-button-spinner"
              aria-hidden="true"></span>
            Cadastrar Chamado
          </button>
        </div>
      </form>
    </div>
  </div>
  <notify-toast toast-id="chamado-notify-danger" type="danger"></notify-toast>
  <notify-toast toast-id="chamado-notify-success" type="success"></notify-toast>
</body>

</html>
