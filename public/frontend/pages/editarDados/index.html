<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <title>Sistemas de chamados</title>
  <script src="/frontend/pages/editarDados/index.js" type="module" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"
    defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"
    defer></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
    integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"
    defer></script>
  <link rel="stylesheet" href="/frontend/global/styles.css" />
</head>

<body>
  <div class="d-flex justify-content-center align-items-center vh-100">
    <div class="bg-white shadow-lg rounded-4 p-5"
      style="width: 100%; max-height: 90vh; overflow-y: auto; margin: 20px;">
      <div class="mb-5">
        <h1 class="h2 fw-bold mb-2">Editar Dados</h1>
        <p class="text-muted mb-0">Preencha os campos abaixo para atualizar seus dados</p>
      </div>

      <form id="formEditarDados">

        <div class="row g-3 mb-4">
          <div class="col-12">
            <label for="editar-name" class="form-label fw-500">Nome</label>
            <input required type="text" class="form-control form-control-lg" autocomplete="name" name="name"
              id="editar-name" placeholder="seu nome">
          </div>
        </div>

        <div class="row g-3 mb-4">
          <div class="col-12">
            <label for="editar-email" class="form-label fw-500">E-mail</label>
            <input required type="email" class="form-control form-control-lg" autocomplete="email" name="email"
              id="editar-email" placeholder="seu@email.com" aria-describedby="emailHelp">
          </div>
        </div>

        <div class="row g-3 mb-4">
          <div class="col-md-6">
            <label for="editar-telefone" class="form-label fw-500">Telefone</label>
            <input required type="text" class="form-control form-control-lg" autocomplete="tel" name="telefone"
              id="editar-telefone" placeholder="seu telefone">
          </div>
          <div class="col-md-6">
            <label for="editar-cpf" class="form-label fw-500">CPF</label>
            <input required type="text" class="form-control form-control-lg" autocomplete="off" inputmode="numeric"
              name="cpf" id="editar-cpf" placeholder="seu CPF">
          </div>
        </div>


        <hr class="my-4">

        <div class="row g-3 mb-4">
          <div class="col-12">
            <label for="editar-currentPassword" class="form-label fw-500">Senha Atual</label>
            <input required type="password" class="form-control form-control-lg" autocomplete="current-password"
              name="currentPassword" id="editar-currentPassword" placeholder="sua senha atual">
          </div>
        </div>

        <div class="row g-3 mb-5">
          <div class="col-12">
            <label for="editar-newPassword" class="form-label fw-500">Nova Senha</label>
            <input type="password" class="form-control form-control-lg" autocomplete="new-password" name="newPassword"
              id="editar-newPassword" placeholder="sua nova senha">
          </div>
        </div>


        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-primary btn-lg fw-semibold rounded-3">
            <span class="spinner-border spinner-border-sm d-none me-2" id="editar-button-spinner"
              aria-hidden="true"></span>
            Atualizar Dados
          </button>
        </div>
      </form>
    </div>
  </div>
  <notify-toast toast-id="editar-notify-danger" type="danger"></notify-toast>
  <notify-toast toast-id="editar-notify-success" type="success"></notify-toast>
</body>

</html>
