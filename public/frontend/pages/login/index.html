<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/frontend/pages/login/index.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <title>Sistemas de chamados</title>
  <script src="/frontend/pages/login/index.js" type="module" defer></script>
  <script src="/frontend/components/notify-toast.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"
    defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"
    defer></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
    integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"
    defer></script>
  <link rel="stylesheet" href="/frontend/global/styles.css" />
</head>

<body>
  <div class="container justify-content-center align-items-center d-flex flex-column vh-100">
    <div class="container w-50 p-3 bg-white shadow-sm border border-gray rounded-3 text-start">
      <h1 class="font-bold">Entrar</h1>
      <p class="fs-5">Acesse com seu email e senha</p>

      <form id="formLogin">
        <div class="mb-3">
          <label for="loginEmail" class="form-label">Email address</label>
          <input type="email" class="form-control" autocomplete="email" name="email" id="login-email"
            placeholder="seu@email.com" aria-describedby="emailHelp">
        </div>
        <div class="mb-3">
          <label for="loginPassword" class="form-label">Password</label>
          <input type="password" autocomplete="current-password" class="form-control" name="password"
            id="login-password" placeholder="sua senha">
        </div>
        <div class="d-flex flex-column justify-content-center align-items-stretch mt-4">
          <button type="submit" class="btn btn-primary">
            <span class="spinner-border spinner-border-sm d-none" id="login-button-spinner" aria-hidden="true"></span>
            Entrar
          </button>
        </div>
      </form>

      <p>Não tem conta? <a href="/cadastro">Cadastre-se</a></p>

    </div>
    <notify-toast toast-id="login-notify-danger" type="danger"></notify-toast>
    <notify-toast toast-id="login-notify-success" type="success"></notify-toast>
</body>

</html>
